<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | RouteOptimizer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0f172a; color: #e6eeff; font-family: Poppins, Inter, sans-serif; }
        .wrap { min-height: 100dvh; display: grid; place-items: center; padding: 24px; }
        .cardx { width: min(460px, 100%); background: linear-gradient(160deg, #16233f, #111d35); border: 1px solid rgba(148,163,184,.22); border-radius: 18px; padding: 22px; box-shadow: 0 18px 46px rgba(2,6,23,.42); }
        .logo { width: 56px; height: 56px; border-radius: 14px; object-fit: cover; }
    </style>
</head>
<body>
    <main class="wrap">
        <section class="cardx">
            <div class="d-flex align-items-center gap-3 mb-3">
                <img class="logo" src="{{ url_for('static', filename='img/logo.png') }}" alt="RouteOptimizer">
                <div>
                    <h1 class="h5 mb-0">Entrar</h1>
                    <small class="text-secondary">Acesse sua conta</small>
                </div>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="post">
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input class="form-control" name="email" type="email" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Senha</label>
                    <input class="form-control" name="password" type="password" required>
                </div>
                <div class="d-grid gap-2">
                    <button class="btn btn-success" type="submit">Entrar</button>
                    <a class="btn btn-outline-light" href="{{ url_for('auth.register') }}">Criar conta</a>
                    <a class="btn btn-secondary" href="{{ url_for('main.home') }}">Voltar</a>
                </div>
            </form>
        </section>
    </main>
</body>
</html>
