<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0f141b">
    <title>RouteOptimizer - Roteirizacao Inteligente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="app-shell">
        <nav class="app-navbar">
            <button class="header-icon-btn" type="button" aria-label="Menu">
                <i class="fas fa-bars"></i>
            </button>
            <div class="header-center">
                <h1 class="header-brand">
                    <img class="header-logo" src="{{ url_for('static', filename='img/logo.png') }}" alt="RouteOptimizer">
                    <span>RouteOptimizer</span>
                </h1>
                <span>Roteirizacao inteligente</span>
            </div>
            <button class="header-icon-btn" type="button" id="btnMapLocate" aria-label="Minha Localizacao">
                <i class="fas fa-location-crosshairs"></i>
            </button>
        </nav>

        <section class="map-stage">
            <div id="map" class="map-container"></div>
            <div class="map-floating-controls">
                <button class="floating-btn" id="btnZoomIn" type="button" aria-label="Aproximar">+</button>
                <button class="floating-btn" id="btnZoomOut" type="button" aria-label="Afastar">-</button>
            </div>
        </section>

        <section class="bottom-sheet">
            <div class="section-block">
                <span class="section-title">Origem</span>
                <div class="input-group">
                    <input type="text" class="form-control" id="currentLocation" placeholder="Digite sua rua atual">
                    <button class="btn btn-outline-primary" type="button" id="btnGetLocation">Detectar automaticamente</button>
                </div>
                <small class="sheet-hint">
                    <span id="coordsDisplay">Digite sua origem manualmente ou clique em "Detectar"</span>
                </small>
            </div>

            <div class="section-block">
                <span class="section-title">Destinos</span>
                <div class="position-relative">
                    <div class="input-group">
                        <input type="text" class="form-control" id="addressInput" placeholder="Adicionar endereco">
                        <button class="btn btn-outline-success" type="button" id="btnAddAddress" title="Adicionar endereco">
                            <i class="fas fa-plus"></i> Adicionar endereco
                        </button>
                    </div>
                    <div id="addressSuggestions" class="list-group autocomplete-suggestions d-none"></div>
                </div>
                <div class="mt-2">
                    <textarea class="form-control" id="addressBulkInput" rows="3" placeholder="Colar lista de enderecos"></textarea>
                    <div class="d-grid mt-2">
                        <button class="btn btn-outline-success" type="button" id="btnAddAddressList">Importar lista</button>
                    </div>
                </div>
                <div class="sheet-subline">
                    <span>Enderecos cadastrados</span>
                    <span class="badge text-bg-secondary" id="addressCount">0</span>
                </div>
                <div id="addressItems" class="list-group address-items"></div>
                <textarea class="d-none" id="addressList"></textarea>
            </div>

            <div id="resultsCard" class="section-block result-panel" style="display: none;">
                <div class="result-stats mb-3">
                    <div class="result-stat-box">
                        <span class="label">Distancia total</span>
                        <strong><span id="totalDistance">0</span> km</strong>
                    </div>
                    <div class="result-stat-box">
                        <span class="label">Tempo estimado</span>
                        <strong><span id="totalDuration">0</span> min</strong>
                    </div>
                </div>
                <div class="d-grid gap-2 mb-3">
                    <button class="btn btn-outline-success" id="btnOpenWazeSequence" type="button">
                        <i class="fas fa-location-arrow"></i> Abrir sequencia no Waze
                    </button>
                    <button class="btn btn-outline-primary" id="btnOpenGoogleSequence" type="button">
                        <i class="fas fa-map-marked-alt"></i> Abrir rota completa no Google Maps
                    </button>
                </div>
                <div id="routeList" class="list-group"></div>
            </div>

            <div class="mobile-action-bar">
                <button class="btn btn-success btn-lg w-100" id="btnCalculateRoute" type="button">CALCULAR MELHOR ROTA</button>
                <div class="aux-actions mt-2">
                    <button class="btn btn-secondary" id="btnClear" type="button">
                        <i class="fas fa-trash"></i> Limpar
                    </button>
                    <a class="btn btn-outline-primary" id="btnDownloadApk" href="/download/android-apk">
                        <i class="fab fa-android"></i> Baixar APK
                    </a>
                </div>
            </div>

            <div id="statusAlert" class="alert d-none mt-3" role="alert"></div>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
