<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RouteOptimizer | Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0f172a; color: #e6eeff; font-family: Poppins, Inter, sans-serif; }
        .hero { min-height: 100dvh; display: grid; place-items: center; padding: 24px; }
        .panel { width: min(980px, 100%); background: linear-gradient(160deg, #16233f, #111d35); border: 1px solid rgba(148,163,184,.22); border-radius: 22px; padding: 28px; box-shadow: 0 20px 50px rgba(2,6,23,.45); }
        .logo { width: 64px; height: 64px; border-radius: 14px; object-fit: cover; border: 1px solid rgba(148,163,184,.35); }
        .muted { color: #9eb1d6; }
    </style>
</head>
<body>
    <main class="hero">
        <section class="panel">
            <div class="d-flex align-items-center gap-3 mb-3">
                <img class="logo" src="{{ url_for('static', filename='img/logo.png') }}" alt="RouteOptimizer">
                <div>
                    <h1 class="h3 mb-1">RouteOptimizer</h1>
                    <div class="muted">Roteirizacao inteligente para entregadores</div>
                </div>
            </div>
            <p class="muted mb-4">Organize destinos, otimize ordem de entrega e navegue com Google Maps ou Waze.</p>
            <div class="d-flex flex-wrap gap-2">
                {% if current_user %}
                <a class="btn btn-success" href="{{ url_for('main.app_page') }}">Abrir aplicativo</a>
                <form method="post" action="{{ url_for('auth.logout') }}">
                    <button class="btn btn-outline-light" type="submit">Sair</button>
                </form>
                {% else %}
                <a class="btn btn-success" href="{{ url_for('auth.register') }}">Criar conta</a>
                <a class="btn btn-outline-light" href="{{ url_for('auth.login') }}">Entrar</a>
                {% endif %}
            </div>
        </section>
    </main>
</body>
</html>
